server {
    listen 80;
    server_name lealtad.ambarrojostudios.cloud;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name lealtad.ambarrojostudios.cloud;

    ssl_certificate     /etc/letsencrypt/live/lealtad.ambarrojostudios.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lealtad.ambarrojostudios.cloud/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
