<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Panel — Dueño</title>
<link rel="stylesheet" href="style.css">
<style>
  body { display:block; align-items:initial; padding:18px; }
  .wrap { max-width:1200px; margin:0 auto; }
  .grid { display:grid; grid-template-columns:1fr 1.3fr; gap:16px; align-items:start; margin-top:16px; }
  .grid .panel { margin-top:0; height:100%; }
  @media (max-width: 900px) { .grid { grid-template-columns:1fr; } }

  .top { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:18px; }
  .brand { display:flex; align-items:center; gap:12px; min-width:0; }
  .badge { width:44px; height:44px; border-radius:12px; background:#e23b3b; flex:none;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 8px 20px rgba(226,59,59,.35); }
  .brand h1 { font-size:1.35rem; margin:0; line-height:1.1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .brand .sub { color:#8b90a8; font-size:.8rem; }
  .ghost { width:auto; padding:10px 16px; margin:0; background:#1a1f35; color:#f2f3f7;
    border:1px solid #2c3354; display:flex; align-items:center; gap:8px;
    transition:border-color .2s, background .2s; }
  .ghost:hover { background:#222843; border-color:#3a4470; }

  .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; }
  .kpi { background:#1a1f35; border:1px solid #232a47; border-radius:14px; padding:15px;
    display:flex; gap:12px; align-items:center; transition:border-color .2s, transform .2s; }
  .kpi:hover { border-color:#3a4470; transform:translateY(-2px); }
  .kpi .ic { width:38px; height:38px; border-radius:10px; flex:none;
    display:flex; align-items:center; justify-content:center; }
  .kpi .n { font-size:1.7rem; font-weight:700; line-height:1; }
  .kpi .l { color:#8b90a8; font-size:.78rem; margin-top:3px; }

  .panel { background:#1a1f35; border:1px solid #232a47; border-radius:16px; padding:18px; margin-top:16px; }
  .panel h2 { font-size:1rem; margin:0 0 16px; display:flex; align-items:center; gap:8px; }

  .chart { display:flex; align-items:flex-end; gap:5px; height:240px;
    border-bottom:1px solid #2c3354; padding-top:20px; }
  .bar { flex:1; background:linear-gradient(180deg,#e23b3b,#b62d2d); border-radius:5px 5px 0 0;
    min-height:3px; position:relative; cursor:default; transition:filter .15s; }
  .bar:hover { filter:brightness(1.2); }
  .bar b { position:absolute; top:-17px; left:0; right:0; text-align:center; font-size:.7rem; color:#f2f3f7; }
  .xlabels { display:flex; gap:5px; margin-top:6px; }
  .xlabels span { flex:1; text-align:center; font-size:.6rem; color:#8b90a8; }

  .toolbar { display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:12px; }
  .toolbar .count { color:#8b90a8; font-size:.82rem; white-space:nowrap; }
  .search { margin:0; flex:1; }
  .tscroll { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:.9rem; }
  thead th { position:sticky; top:0; background:#1a1f35; }
  th, td { text-align:left; padding:11px 8px; border-bottom:1px solid #2c3354; white-space:nowrap; }
  th { color:#8b90a8; font-weight:600; }
  th.sortable { cursor:pointer; user-select:none; transition:color .2s; }
  th.sortable:hover { color:#f2f3f7; }
  th .arrow { opacity:.5; font-size:.7rem; }
  tbody tr { transition:background .15s; }
  tbody tr:hover { background:#222843; }
  td a { color:#37d67a; text-decoration:none; }
  td a:hover { text-decoration:underline; }
  .tag { background:#2c3354; border-radius:8px; padding:2px 9px; font-size:.78rem; }
  .tag.win { background:#1f4a32; color:#37d67a; }
  .tag.near { background:#4a3a14; color:#f5a623; }
  .state { color:#8b90a8; text-align:center; padding:28px 0; }
  .spin { width:22px; height:22px; border:3px solid #2c3354; border-top-color:#e23b3b;
    border-radius:50%; display:inline-block; animation:spin .8s linear infinite; vertical-align:middle; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* ── Settings & Tiers ── */
  .settings-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-top:16px; }
  @media (max-width:700px) { .settings-grid { grid-template-columns:1fr; } }

  .field { margin-bottom:12px; }
  .field label { display:block; font-size:.78rem; color:#8b90a8; margin-bottom:5px; }
  .field input { width:100%; box-sizing:border-box; background:#111528; border:1px solid #2c3354;
    border-radius:10px; padding:10px 12px; color:#f2f3f7; font-size:.9rem; font-family:inherit;
    transition:border-color .2s; }
  .field input:focus { outline:none; border-color:#e23b3b; }

  /* ── Login ── */
  .login-overlay { position:fixed; inset:0; background:#111528; z-index:100;
    display:flex; align-items:center; justify-content:center; padding:20px; }
  .login-card { background:#1a1f35; border:1px solid #232a47; border-radius:20px;
    padding:36px 30px; width:100%; max-width:380px; text-align:center;
    box-shadow:0 20px 60px rgba(0,0,0,.4); }
  .login-card .badge { margin:0 auto 16px; width:56px; height:56px; border-radius:16px; }
  .login-card h2 { margin:0 0 4px; font-size:1.2rem; }
  .login-card .sub { color:#8b90a8; font-size:.85rem; margin-bottom:24px; }
  .login-card input { width:100%; box-sizing:border-box; background:#111528; border:1px solid #2c3354;
    border-radius:12px; padding:13px 15px; color:#f2f3f7; font-size:1rem; font-family:inherit;
    text-align:center; letter-spacing:.1em; transition:border-color .2s; }
  .login-card input:focus { outline:none; border-color:#e23b3b; }
  .login-card button { width:100%; margin-top:14px; padding:13px; border:none; border-radius:12px;
    background:#e23b3b; color:#fff; font-size:.95rem; font-weight:600; font-family:inherit; cursor:pointer;
    transition:filter .2s; }
  .login-card button:hover { filter:brightness(1.1); }
  .login-card button:disabled { opacity:.5; cursor:not-allowed; }
  .login-err { color:#f87171; font-size:.83rem; margin:10px 0 0; min-height:1.2em; }
  .login-card.shake { animation:shake .4s; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-8px)} 75%{transform:translateX(8px)} }

  .btn-save { background:#e23b3b; color:#fff; border:none; border-radius:10px;
    padding:10px 20px; font-size:.9rem; font-weight:600; cursor:pointer;
    font-family:inherit; transition:opacity .2s; }
  .btn-save:hover { opacity:.85; }
  .btn-save:disabled { opacity:.5; cursor:default; }
  .save-msg { font-size:.82rem; margin-left:12px; }
  .save-msg.ok { color:#37d67a; }
  .save-msg.err { color:#e23b3b; }

  .tier-list { list-style:none; padding:0; margin:0 0 14px; }
  .tier-list li { display:flex; align-items:center; gap:10px; padding:9px 0;
    border-bottom:1px solid #2c3354; }
  .tier-badge { background:#e23b3b22; color:#e23b3b; border-radius:8px;
    padding:2px 10px; font-size:.82rem; font-weight:700; white-space:nowrap; }
  .tier-desc { flex:1; font-size:.9rem; }
  .tier-actions button { background:none; border:none; color:#8b90a8; cursor:pointer;
    font-size:1.1rem; padding:2px 5px; border-radius:6px; transition:color .2s; }
  .tier-actions button:hover { color:#f2f3f7; }
  .tier-actions button.del:hover { color:#e23b3b; }

  .tier-form { display:flex; gap:8px; flex-wrap:wrap; }
  .tier-form input { background:#111528; border:1px solid #2c3354; border-radius:10px;
    padding:8px 12px; color:#f2f3f7; font-size:.85rem; font-family:inherit; }
  .tier-form input:focus { outline:none; border-color:#e23b3b; }
  .tier-form input[type=number] { width:90px; }
  .tier-form input[type=text] { flex:1; min-width:140px; }
  .tier-form button { background:#e23b3b; color:#fff; border:none; border-radius:10px;
    padding:8px 16px; font-size:.85rem; font-weight:600; cursor:pointer; font-family:inherit; }

  :focus-visible { outline:2px solid #e23b3b; outline-offset:2px; border-radius:6px; }
  @media (prefers-reduced-motion:reduce) { * { transition:none !important; animation:none !important; } }

  @media (max-width:640px) {
    body { padding:14px; }
    .top { flex-wrap:wrap; }
    .brand h1 { font-size:1.2rem; white-space:normal; }
    .kpis { grid-template-columns:1fr 1fr; }
    .kpi { padding:13px; }
    .kpi .n { font-size:1.5rem; }
    thead { display:none; }
    table, tbody, tr, td { display:block; width:100%; }
    tbody tr { border:1px solid #232a47; border-radius:12px; margin-bottom:10px;
      background:#161b30; padding:4px 0; }
    tbody tr:hover { background:#161b30; }
    td { border:none; display:flex; justify-content:space-between; align-items:center;
      gap:12px; padding:8px 14px; white-space:normal; }
    td::before { content:attr(data-label); color:#8b90a8; font-size:.82rem; }
    td[data-label="Nombre"] { font-weight:600; font-size:1.05rem; padding-top:12px; }
    td[data-label="Nombre"]::before { display:none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="brand">
      <div class="badge" id="badge">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round"><path d="M20.42 4.58a5.4 5.4 0 0 0-7.65 0L12 5.36l-.77-.78a5.4 5.4 0 0 0-7.65 7.65l.78.77L12 20.66l7.64-7.66.78-.77a5.4 5.4 0 0 0 0-7.65z"/></svg>
      </div>
      <div>
        <h1 id="biz">Panel</h1>
        <div class="sub">Programa de lealtad · vista del dueño</div>
      </div>
    </div>
    <button class="ghost" id="refresh">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>
      Actualizar
    </button>
  </div>

  <div class="kpis" id="kpis">
    <div class="state"><span class="spin"></span> Cargando métricas…</div>
  </div>

  <!-- Configuración + Tiers -->
  <div class="settings-grid">
    <div class="panel">
      <h2>Configuración del negocio</h2>
      <div class="field"><label>Nombre del negocio</label><input id="s-business" type="text" placeholder="Mi Negocio"></div>
      <div class="field"><label>Color principal (hex)</label><input id="s-color" type="text" placeholder="#E23B3B" maxlength="7"></div>
      <div class="field"><label>URL del logo (opcional)</label><input id="s-logo" type="url" placeholder="https://..."></div>
      <div class="field"><label>Fondo de la tarjeta (hex, vacío = default)</label><input id="s-cardbg" type="text" placeholder="#1A1A2E" maxlength="7"></div>
      <div class="field"><label>URL de foto de fondo (opcional)</label><input id="s-cardbgimg" type="url" placeholder="https://..."></div>
      <div class="field"><label>Color del texto de la tarjeta (hex, vacío = blanco)</label><input id="s-cardtext" type="text" placeholder="#FFFFFF" maxlength="7"></div>
      <div class="field"><label>Frase de la tarjeta (opcional)</label><input id="s-tagline" type="text" placeholder="Ej. Tu café de siempre te premia"></div>
      <div class="field"><label>Duración del ciclo (días)</label><input id="s-cycle" type="number" min="1" placeholder="30"></div>
      <div style="display:flex;align-items:center">
        <button class="btn-save" id="s-save">Guardar cambios</button>
        <span class="save-msg" id="s-msg"></span>
      </div>
    </div>

    <div class="panel">
      <h2>Recompensas</h2>
      <ul class="tier-list" id="tier-list"><li class="state"><span class="spin"></span></li></ul>
      <div class="tier-form">
        <input type="number" id="t-stamps" min="1" placeholder="Sellos" title="Sellos requeridos">
        <input type="text" id="t-desc" placeholder="Descripción del premio">
        <button id="t-add">+ Agregar</button>
      </div>
    </div>
  </div>

  <!-- Gráfica + Clientes -->
  <div class="grid">
    <div class="panel">
      <h2>Sellos por día <span style="color:#8b90a8;font-weight:400">· últimos 14 días</span></h2>
      <div id="chart"></div>
    </div>
    <div class="panel">
      <h2>Clientes</h2>
      <div class="toolbar">
        <input class="search" id="search" placeholder="Buscar por nombre o teléfono…">
        <span class="count" id="count"></span>
      </div>
      <div class="tscroll">
        <table>
          <thead><tr>
            <th>Nombre</th><th>WhatsApp</th>
            <th class="sortable" data-k="stamps">Sellos <span class="arrow">↕</span></th>
            <th class="sortable" data-k="rewards">Premios <span class="arrow">↕</span></th>
            <th class="sortable" data-k="created_at">Alta <span class="arrow">↕</span></th>
          </tr></thead>
          <tbody id="rows"><tr><td colspan="5" class="state"><span class="spin"></span></td></tr></tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="login-overlay" id="login" style="display:none">
  <div class="login-card" id="login-card">
    <div class="badge"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></div>
    <h2>Panel del negocio</h2>
    <p class="sub" id="login-slug"></p>
    <form id="login-form">
      <input type="password" id="login-pass" placeholder="Clave de acceso" autocomplete="current-password" autofocus>
      <p class="login-err" id="login-err"></p>
      <button type="submit" id="login-btn">Entrar</button>
    </form>
  </div>
</div>

<script>
  // Lee el slug desde ?b=slug en la URL
  const slug = new URLSearchParams(location.search).get('b') || 'negocio-1';

  let pass = localStorage.getItem('staffPass_' + slug) || '';

  function showLogin(msg = '') {
    document.getElementById('login').style.display = '';
    document.getElementById('login-slug').textContent = slug;
    document.getElementById('login-err').textContent = msg;
    document.getElementById('login-pass').focus();
    if (msg) {
      const card = document.getElementById('login-card');
      card.classList.remove('shake'); void card.offsetWidth; card.classList.add('shake');
    }
  }

  document.getElementById('login-form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('login-btn');
    const candidate = document.getElementById('login-pass').value;
    if (!candidate) return;
    btn.disabled = true; btn.textContent = 'Verificando...';
    try {
      const r = await fetch(`/api/${slug}/stats`, { headers: { 'Authorization': 'Bearer ' + candidate } });
      if (r.ok) {
        pass = candidate;
        localStorage.setItem('staffPass_' + slug, pass);
        document.getElementById('login').style.display = 'none';
        load();
      } else if (r.status === 429) {
        showLogin('Demasiados intentos. Espera 15 minutos.');
      } else {
        showLogin('Clave incorrecta.');
      }
    } catch {
      showLogin('Sin conexión. Intenta de nuevo.');
    } finally {
      btn.disabled = false; btn.textContent = 'Entrar';
    }
  });

  let customers = [], sort = { k: 'created_at', dir: -1 };

  async function api(path, opts = {}) {
    const r = await fetch(path, { ...opts, headers: { 'Authorization': 'Bearer ' + pass, ...(opts.headers || {}) } });
    if (r.status === 401) {
      localStorage.removeItem('staffPass_' + slug);
      pass = '';
      showLogin('Tu sesión expiró. Vuelve a entrar.');
      throw new Error('401');
    }
    return r.json();
  }

  // ── KPIs y gráfica ──────────────────────────────────────────────────────────
  const icons = {
    users: '<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>',
    stamp: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="M22 4 12 14.01l-3-3"/>',
    gift:  '<polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><line x1="12" y1="22" x2="12" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>',
    new:   '<path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/>',
  };
  function svg(name, color) {
    return `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${icons[name]}</svg>`;
  }
  function kpi(name, color, n, l) {
    return `<div class="kpi"><div class="ic" style="background:${color}22">${svg(name,color)}</div>
      <div><div class="n">${n}</div><div class="l">${l}</div></div></div>`;
  }

  function renderStats(s) {
    const name = s.business || s.name || slug;
    document.getElementById('biz').textContent = name;
    document.title = 'Panel — ' + name;
    document.getElementById('kpis').innerHTML = [
      kpi('users', '#3b82f6', s.customers, 'Clientes'),
      kpi('stamp', '#e23b3b', s.visits,    'Sellos otorgados'),
      kpi('gift',  '#37d67a', s.rewards,   'Premios ganados'),
      kpi('new',   '#a78bfa', s.new_today, 'Nuevos hoy'),
    ].join('');

    const chart = document.getElementById('chart');
    if (!s.daily || !s.daily.length) { chart.innerHTML = '<p class="state">Sin actividad todavía.</p>'; return; }
    const max = Math.max(...s.daily.map(d => d.n));
    const bars   = s.daily.map(d => `<div class="bar" style="height:${(d.n/max*100).toFixed(0)}%" title="${d.d}: ${d.n}"><b>${d.n}</b></div>`).join('');
    const labels = s.daily.map(d => `<span>${d.d.slice(5)}</span>`).join('');
    chart.innerHTML = `<div class="chart">${bars}</div><div class="xlabels">${labels}</div>`;
  }

  function renderRows() {
    const q = document.getElementById('search').value.toLowerCase().trim();
    let list = customers.filter(c => (c.name||'').toLowerCase().includes(q) || c.phone.includes(q));
    list.sort((a,b) => { const x=a[sort.k], y=b[sort.k]; return (x>y?1:x<y?-1:0)*sort.dir; });
    document.getElementById('count').textContent = `${list.length} de ${customers.length}`;
    const wa = p => '52' + p;
    document.getElementById('rows').innerHTML = list.map(c => `<tr>
      <td data-label="Nombre">${c.name||'—'}</td>
      <td data-label="WhatsApp"><a href="https://wa.me/${wa(c.phone)}" target="_blank">${c.phone}</a></td>
      <td data-label="Sellos">${c.stamps}</td>
      <td data-label="Premios">${c.rewards > 0 ? `<span class="tag win">${c.rewards}</span>` : '0'}</td>
      <td data-label="Alta">${c.created_at.slice(0,10)}</td>
    </tr>`).join('') || '<tr><td colspan="5" class="state">Sin clientes.</td></tr>';
  }

  document.getElementById('search').oninput = renderRows;
  document.querySelectorAll('th.sortable').forEach(th => th.onclick = () => {
    const k = th.dataset.k;
    sort = { k, dir: sort.k === k ? -sort.dir : -1 };
    renderRows();
  });

  // ── Settings ─────────────────────────────────────────────────────────────────
  async function loadSettings() {
    const s = await api(`/api/config?b=${slug}`);
    document.getElementById('s-business').value = s.business || s.name || '';
    document.getElementById('s-color').value    = s.primary_color || '';
    document.getElementById('s-logo').value     = s.logo_url || '';
    document.getElementById('s-cardbg').value    = s.card_bg || '';
    document.getElementById('s-cardbgimg').value = s.card_bg_image || '';
    document.getElementById('s-cardtext').value = s.card_text_color || '';
    document.getElementById('s-tagline').value  = s.tagline || '';
    document.getElementById('s-cycle').value    = s.cycle_days || 30;
  }

  document.getElementById('s-save').onclick = async () => {
    const btn = document.getElementById('s-save');
    const msg = document.getElementById('s-msg');
    btn.disabled = true; msg.textContent = '';
    try {
      await api(`/api/${slug}/settings`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          name:          document.getElementById('s-business').value.trim(),
          primary_color: document.getElementById('s-color').value.trim(),
          logo_url:      document.getElementById('s-logo').value.trim(),
          card_bg:         document.getElementById('s-cardbg').value.trim(),
          card_bg_image:   document.getElementById('s-cardbgimg').value.trim(),
          card_text_color: document.getElementById('s-cardtext').value.trim(),
          tagline:         document.getElementById('s-tagline').value.trim(),
          cycle_days:    Number(document.getElementById('s-cycle').value),
        }),
      });
      msg.textContent = '✓ Guardado';
      msg.className = 'save-msg ok';
      setTimeout(() => { msg.textContent = ''; }, 3000);
    } catch (e) {
      msg.textContent = 'Error al guardar';
      msg.className = 'save-msg err';
    } finally { btn.disabled = false; }
  };

  // ── Tiers ────────────────────────────────────────────────────────────────────
  async function loadTiers() {
    const tiers = await api(`/api/${slug}/reward-tiers`);
    renderTiers(tiers);
  }

  function renderTiers(tiers) {
    const ul = document.getElementById('tier-list');
    if (!tiers.length) { ul.innerHTML = '<li style="color:#8b90a8;font-size:.85rem">Sin recompensas configuradas.</li>'; return; }
    ul.innerHTML = tiers.map(t => `
      <li>
        <span class="tier-badge">${t.stamps_required} ★</span>
        <span class="tier-desc">${t.description}</span>
        <span class="tier-actions">
          <button onclick="editTier(${t.id},'${t.stamps_required}','${t.description.replace(/'/g,"\\'")}')">Editar</button>
          <button class="del" onclick="deleteTier(${t.id})">Eliminar</button>
        </span>
      </li>`).join('');
  }

  document.getElementById('t-add').onclick = async () => {
    const stamps = Number(document.getElementById('t-stamps').value);
    const desc   = document.getElementById('t-desc').value.trim();
    if (!stamps || !desc) return;
    const tiers = await api(`/api/${slug}/reward-tiers`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stamps_required: stamps, description: desc }),
    });
    renderTiers(tiers);
    document.getElementById('t-stamps').value = '';
    document.getElementById('t-desc').value   = '';
  };

  async function deleteTier(id) {
    if (!confirm('¿Eliminar esta recompensa?')) return;
    const tiers = await api(`/api/${slug}/reward-tiers/${id}`, { method: 'DELETE' });
    renderTiers(tiers);
  }

  async function editTier(id, stamps, desc) {
    const newStamps = prompt('Sellos requeridos:', stamps);
    if (newStamps === null) return;
    const newDesc = prompt('Descripción:', desc);
    if (newDesc === null) return;
    const tiers = await api(`/api/${slug}/reward-tiers/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stamps_required: Number(newStamps), description: newDesc }),
    });
    renderTiers(tiers);
  }

  // ── Load all ─────────────────────────────────────────────────────────────────
  async function load() {
    try {
      const [s, list] = await Promise.all([
        api(`/api/${slug}/stats`),
        api(`/api/${slug}/customers`),
      ]);
      customers = list;
      renderStats(s);
      renderRows();
    } catch (e) {
      document.getElementById('kpis').innerHTML = '<p class="state">No se pudo cargar. Revisa tu conexión.</p>';
    }
    loadSettings();
    loadTiers();
  }

  document.getElementById('refresh').onclick = load;
  pass ? load() : showLogin();
</script>
</body>
</html>
