<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sellar — Personal</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
</head>
<body>
<div class="card">
  <h1>Sellar tarjeta</h1>
  <p class="muted">Apunta la cámara al QR del cliente.</p>
  <video id="cam" playsinline></video>
  <canvas id="c" hidden></canvas>
  <p id="result" class="big"></p>
  <button id="next" hidden>Siguiente cliente</button>
</div>
<script>
  // El personal mete la clave una sola vez por dispositivo.
  let pass = localStorage.getItem('staffPass');
  if (!pass) { pass = prompt('Clave del personal:') || ''; localStorage.setItem('staffPass', pass); }

  const video = document.getElementById('cam');
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const result = document.getElementById('result');
  const next = document.getElementById('next');
  let busy = false;

  navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
    .then(s => { video.srcObject = s; video.play(); requestAnimationFrame(tick); })
    .catch(() => { result.className = 'big err'; result.textContent = 'Sin acceso a cámara'; });

  function tick() {
    if (!busy && video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width = video.videoWidth; canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const code = jsQR(img.data, img.width, img.height);
      if (code) stamp(code.data);
    }
    requestAnimationFrame(tick);
  }

  async function stamp(token) {
    busy = true;
    const r = await fetch('/api/stamp', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + pass },
      body: JSON.stringify({ token })
    });
    const data = await r.json();
    if (r.status === 401) {
      localStorage.removeItem('staffPass');
      result.className = 'big err'; result.textContent = 'Clave incorrecta, recarga';
      return;
    }
    if (!r.ok) {
      result.className = 'big err'; result.textContent = data.error;
    } else if (data.earned) {
      result.className = 'big ok'; result.textContent = '🎉 ¡Premio ganado!';
    } else {
      result.className = 'big ok'; result.textContent = '✓ Sello ' + data.stamps + '/' + data.goal;
    }
    next.hidden = false;
  }

  next.onclick = () => { busy = false; result.textContent = ''; next.hidden = true; };
</script>
</body>
</html>
