<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mi tarjeta</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f1220">
<link rel="apple-touch-icon" href="icon.svg">
<script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
</head>
<body>
<div class="card">
  <h1 id="biz">Mi tarjeta</h1>
  <p class="muted" id="hi"></p>
  <canvas id="qr"></canvas>
  <p class="muted">Muestra este código en el local para sellar.</p>
  <div class="stamps" id="stamps"></div>
  <p class="big"><span id="count">0</span>/<span id="goal">0</span></p>
  <p id="reward" class="ok"></p>
</div>
<script>
  const token = new URLSearchParams(location.search).get('t') || localStorage.getItem('token');
  if (!token) location.href = 'join.html';

  QRCode.toCanvas(document.getElementById('qr'), token, { width: 200, margin: 1 });

  async function load() {
    const r = await fetch('/api/card?t=' + token);
    if (!r.ok) { location.href = 'join.html'; return; }
    const c = await r.json();
    document.getElementById('biz').textContent = c.business;
    document.getElementById('hi').textContent = c.name ? '¡Hola ' + c.name + '!' : '';
    document.getElementById('count').textContent = c.stamps;
    document.getElementById('goal').textContent = c.goal;

    const grid = document.getElementById('stamps');
    grid.innerHTML = '';
    for (let i = 0; i < c.goal; i++) {
      const d = document.createElement('div');
      d.className = 'stamp' + (i < c.stamps ? ' on' : '');
      d.textContent = i < c.stamps ? '★' : '';
      grid.appendChild(d);
    }
    const rw = document.getElementById('reward');
    rw.textContent = c.rewards > 0
      ? '🎉 Premios ganados: ' + c.rewards + ' — ' + c.reward_text
      : 'Completa tu tarjeta y gana: ' + c.reward_text;
  }
  load();
  // Refresca al volver a la pestaña (tras sellar en el local).
  document.addEventListener('visibilitychange', () => { if (!document.hidden) load(); });
  // Habilita "Agregar a pantalla de inicio" (PWA).
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
</script>
</body>
</html>
